name: CI

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  build:
    name: Build and test
    runs-on: ubuntu-latest
    env:
      SDKMAN_DIR: ${{ github.workspace }}/.sdkman

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Cache SDKMAN
        uses: actions/cache@v4
        with:
          path: .sdkman
          key: sdkman-java-21.0.11-tem-${{ runner.os }}

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ runner.os }}-${{ hashFiles('**/*.gradle', '**/gradle-wrapper.properties') }}
          restore-keys: |
            gradle-${{ runner.os }}-

      - name: Set up JDK 21 with SDKMAN
        shell: bash
        run: |
          if [ ! -s "${SDKMAN_DIR}/bin/sdkman-init.sh" ]; then
            curl -s "https://get.sdkman.io" | bash
          fi
          source "${SDKMAN_DIR}/bin/sdkman-init.sh"
          sed -i 's/sdkman_auto_answer=false/sdkman_auto_answer=true/' "${SDKMAN_DIR}/etc/config"
          sdk install java 21.0.11-tem
          sdk use java 21.0.11-tem
          echo "JAVA_HOME=${SDKMAN_DIR}/candidates/java/current" >> "${GITHUB_ENV}"
          echo "${SDKMAN_DIR}/candidates/java/current/bin" >> "${GITHUB_PATH}"
          java -version

      - name: Grant execute permission for Gradle wrapper
        run: chmod +x gradlew

      - name: Build
        run: ./gradlew build --no-daemon
